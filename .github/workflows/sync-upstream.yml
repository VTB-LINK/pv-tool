name: Sync Upstream Main

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync-main:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync with upstream and force update
        run: |
          # 1. 配置 Action 机器人的 Git 身份信息
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # 2. 添加原作者的上游仓库地址
          git remote add upstream https://github.com/DanteAlighieri13210914/pv-tool.git

          # 3. 拉取上游的最新代码数据
          git fetch upstream

          # 4. 核心步骤：将本地的 main 分支强行覆盖为上游的 main 分支
          git reset --hard upstream/main

          # 5. 强制推送到你自己的 GitHub 仓库的 main 分支
          git push origin main --force